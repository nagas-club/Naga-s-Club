<style>

*{box-sizing:border-box;
	padding:0;
	margin:0;
	}

body{
	margin-left:5%;
	margin-right:5%;
	}

header img{
	width:100%;
	}

nav{
	width:100%;
	background:#333;
	margin-top:10px;
	position:relative;
	z-index:1000;
	}

nav ul{
	list-style:none;
	display:flex;
	}

nav ul li{
	position:relative;
	}

nav ul li a{
	display:block;
	padding:14px 20px;
	color:white;
	text-decoration:none;
	font-family:Montserrat;
	}

nav ul li a:hover{
	background:#111;
	}

.dropdown-content{
	display:none;
	position:absolute;
	background:#333;
	min-width:160px;
	top:100%;
	left:0;
	}

.dropdown-content a{
	padding:12px 16px;
	display:block;
	color:white;
	}

.dropdown-content a:hover{
	background:#111;
	}

.dropdown:hover .dropdown-content{
	display:block;
	}


.galeria{
	margin-top:40px;
	display:grid;
	grid-template-columns:repeat(4,1fr);
	gap:30px;
	}

.artes{
	position:relative;
	width:100%;
	aspect-ratio:1/1;
	overflow:hidden;
	}


.artes img{
	width:100%;
	height:100%;
	object-fit:cover;
	transition:transform 0.4s;
	}



.artes:hover img{
	transform:scale(1.1);
	filter:brightness(70%);
	}

footer{
background:#891c33;
color:white;
text-align:center;
padding:15px;
font-family:Montserrat;
margin-top:40px;
}	

</style>
